<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Secure Checkout...</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { border: 2px solid #040; border-top: 2px solid #0f0; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <div id="status">INITIALIZING_SECURE_BRIDGE...</div>
    </div>

    <script>
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('product');
            const referralId = params.get('ref') || '0x1CD1F4eD8D9EAB34DF0a7BbCa1643620d7FFeF7B';

            if (!productId) {
                document.getElementById('status').innerText = 'ERROR: MISSING_PRODUCT_ID';
                return;
            }

            try {
                const response = await fetch('products.json');
                const catalog = await response.json();
                const product = catalog.products.find(p => p.id === productId);

                if (!product) {
                    document.getElementById('status').innerText = 'ERROR: PRODUCT_NOT_FOUND';
                    return;
                }

                const checkoutUrl = product.checkout_url;
                if (!checkoutUrl) {
                    document.getElementById('status').innerText = 'ERROR: CHECKOUT_URL_NOT_CONFIGURED';
                    return;
                }

                document.getElementById('status').innerText = 'BRIDGE_ESTABLISHED. REDIRECTING...';
                
                // Construct final Stripe URL with referral metadata
                const finalUrl = new URL(checkoutUrl);
                finalUrl.searchParams.set('client_reference_id', referralId);
                
                window.location.href = finalUrl.toString();

            } catch (err) {
                document.getElementById('status').innerText = 'ERROR: ' + err.message;
            }
        }

        init();
    </script>
</body>
</html>
